[[bin]]
name = "kaya-vec"
path = "src/bin/kaya_vec.rs"

[package]
name    = "kaya-oss"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Unified self-hosted binary for Kaya Suites (Apache 2.0)"

[dependencies]
kaya-core     = { path = "../../crates/kaya-core" }
kaya-storage  = { path = "../../crates/kaya-storage", features = ["postgres"] }
kaya-server   = { path = "../../crates/kaya-server" }
kaya-auth     = { path = "../../crates/kaya-auth" }
kaya-metering = { path = "../../crates/kaya-metering" }
kaya-db       = { path = "../../crates/kaya-db" }
kaya-mcp      = { path = "../../crates/kaya-mcp" }
kaya-oauth    = { path = "../../crates/kaya-oauth" }

axum         = { workspace = true, features = ["macros"] }
tokio        = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
serde_yaml   = { workspace = true }
anyhow       = { workspace = true }
uuid         = { workspace = true }
chrono       = { workspace = true }
utoipa       = { workspace = true }
utoipa-axum  = { workspace = true }
dotenvy      = { workspace = true }

# Auth + sessions
axum-login                = "0.17"
tower-sessions            = "0.14"
tower-sessions-sqlx-store = { version = "0.15", features = ["postgres", "sqlite", "mysql"] }

# Database
sqlx = { version = "0.8", features = [
    "any", "postgres", "sqlite", "mysql", "runtime-tokio", "uuid", "chrono", "tls-rustls",
] }

# Async trait
async-trait = { workspace = true }

# CLI argument parsing (kaya-vec binary)
clap = { version = "4", features = ["derive", "env"] }

# Export archive
zip = "2"

# Middleware
tower-http = { version = "0.6", features = ["cors", "trace", "catch-panic"] }
tower-service = "0.3"

# MCP (HTTP transport)
rmcp = { version = "1.7", features = ["server", "transport-streamable-http-server"] }

# Observability
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Embedded frontend
rust-embed  = { version = "8", features = ["axum"] }
mime_guess  = "2"
