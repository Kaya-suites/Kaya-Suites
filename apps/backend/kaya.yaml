# Kaya Suites — LLM routing configuration
#
# Defaults follow BRD §8.3:
#   fast model  (gpt-4o-mini)            → retrieval_classification, stale_detection
#   strong model (claude-opus-4-6)        → document_generation, edit_proposal
#   embedding model (text-embedding-3-small) → embedding

routing:
  retrieval_classification:
    provider: openai
    model: gpt-5.4
  document_generation:
    provider: openai
    model: gpt-5.4
  edit_proposal:
    provider: openai
    model: gpt-5.4
  stale_detection:
    provider: openai
    model: gpt-5.4
  embedding:
    provider: openai
    model: text-embedding-3-small
  intent_classification:
    provider: openai
    model: gpt-5.4
  research_synthesis:
    provider: openai
    model: gpt-5.4

providers:
  openai:
    api_key_env: OPENAI_API_KEY
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
